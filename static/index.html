<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performativ — News Classifier</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#f8f9fc;color:#1a2233;min-height:100vh;}

  nav{background:#fff;border-bottom:1px solid #e8ecf2;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:#1a2233;letter-spacing:-0.3px;}
  .nav-logo svg{width:28px;height:28px;}
  .nav-badge{background:#eef2ff;color:#4361ee;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;}

  .hero{background:linear-gradient(135deg,#1a2233 0%,#2d3a52 100%);padding:64px 32px;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234361ee' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
  .hero-tag{display:inline-block;background:rgba(67,97,238,0.2);color:#a5b4fc;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;letter-spacing:0.5px;margin-bottom:20px;border:1px solid rgba(67,97,238,0.3);}
  .hero h1{font-size:40px;font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:12px;line-height:1.15;}
  .hero h1 span{color:#7c9eff;}
  .hero p{color:#8fa3c8;font-size:16px;max-width:480px;margin:0 auto 36px;line-height:1.6;}

  .input-card{background:#fff;border-radius:16px;padding:6px 6px 6px 20px;display:flex;gap:8px;align-items:center;max-width:640px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,0.15);}
  input[type="url"]{flex:1;border:none;outline:none;font-size:15px;color:#1a2233;font-family:'Inter',sans-serif;background:transparent;}
  input[type="url"]::placeholder{color:#9ba8bc;}
  .btn{padding:12px 24px;border-radius:10px;border:none;background:#4361ee;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:'Inter',sans-serif;letter-spacing:0.2px;}
  .btn:hover{background:#3451d1;transform:translateY(-1px);}
  .btn:disabled{background:#c5cde8;cursor:not-allowed;transform:none;}

  .main{max-width:720px;margin:0 auto;padding:40px 24px;}

  .loading{display:none;background:#fff;border-radius:16px;padding:40px;text-align:center;border:1px solid #e8ecf2;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
  .pulse{display:inline-flex;gap:6px;margin-bottom:16px;}
  .pulse span{width:10px;height:10px;border-radius:50%;background:#4361ee;animation:pulse 1.2s ease-in-out infinite;}
  .pulse span:nth-child(2){animation-delay:0.2s;}
  .pulse span:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
  .loading p{color:#8fa3c8;font-size:14px;}

  .result{display:none;background:#fff;border-radius:16px;border:1px solid #e8ecf2;box-shadow:0 2px 12px rgba(0,0,0,0.05);overflow:hidden;animation:fadeUp 0.35s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .result-header{padding:24px 28px;border-bottom:1px solid #f0f3f9;display:flex;align-items:center;justify-content:space-between;}
  .label-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-weight:600;font-size:13px;letter-spacing:0.2px;}
  .label-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;}
  .GOOD_NEWS{background:#ecfdf5;color:#059669;}
  .BAD_NEWS{background:#fef2f2;color:#dc2626;}
  .UNRELATED{background:#f1f5f9;color:#64748b;}
  .confidence-pill{background:#f1f5f9;color:#64748b;font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;}
  .result-body{padding:24px 28px;}
  .reasoning{font-size:15px;line-height:1.7;color:#374151;margin-bottom:20px;}
  .topics-label{font-size:11px;font-weight:600;color:#9ba8bc;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;}
  .topics{display:flex;flex-wrap:wrap;gap:8px;}
  .topic-tag{background:#eef2ff;color:#4361ee;padding:5px 13px;border-radius:8px;font-size:13px;font-weight:500;}
  .result-footer{padding:14px 28px;background:#fafbfd;border-top:1px solid #f0f3f9;font-size:12px;color:#9ba8bc;}

  .error{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;color:#dc2626;font-size:14px;}

  .history{margin-top:36px;}
  .history-header{font-size:12px;font-weight:600;color:#9ba8bc;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px;}
  .history-item{background:#fff;border:1px solid #e8ecf2;border-radius:12px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:14px;}
  .history-item:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(67,97,238,0.08);transform:translateY(-1px);}
  .hi-url{font-size:13px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .hi-conf{font-size:12px;color:#9ba8bc;white-space:nowrap;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#4361ee"/><path d="M7 14h14M7 9h9M7 19h11" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    Performativ
  </div>
  <span class="nav-badge">News Classifier</span>
</nav>

<div class="hero">
  <div class="hero-tag">AI-POWERED INTELLIGENCE</div>
  <h1>News that <span>matters</span> to<br>your business</h1>
  <p>Paste any article URL and instantly know if it is relevant to Performativ &mdash; with reasoning and confidence score.</p>
  <div class="input-card">
    <input type="url" id="url" placeholder="https://www.ft.com/content/..." />
    <button class="btn" id="btn">Classify &rarr;</button>
  </div>
</div>

<div class="main">
  <div class="loading" id="loading">
    <div class="pulse"><span></span><span></span><span></span></div>
    <p>Fetching and analyzing article...</p>
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-header">
      <span class="label-badge" id="label"></span>
      <span class="confidence-pill" id="confidence"></span>
    </div>
    <div class="result-body">
      <p class="reasoning" id="reasoning"></p>
      <div class="topics-label">Relevant topics</div>
      <div class="topics" id="topics"></div>
    </div>
    <div class="result-footer" id="footer"></div>
  </div>

  <div class="history" id="history-section" style="display:none">
    <div class="history-header">Recent classifications</div>
    <div id="history"></div>
  </div>
</div>

<script>
document.getElementById("btn").addEventListener("click", classify);
document.getElementById("url").addEventListener("keydown", function(e) {
  if (e.key === "Enter") classify();
});

async function classify() {
  var urlInput = document.getElementById("url");
  var url = urlInput.value.trim();
  if (!url) return;

  var btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Analyzing...";
  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";
  document.getElementById("error").style.display = "none";

  try {
    var res = await fetch("/classify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: url })
    });
    if (!res.ok) {
      var errData = await res.json();
      throw new Error(errData.detail || "Request failed");
    }
    var data = await res.json();
    showResult(data);
    loadHistory();
  } catch (e) {
    document.getElementById("error").textContent = e.message;
    document.getElementById("error").style.display = "block";
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Classify &rarr;";
    document.getElementById("loading").style.display = "none";
  }
}

function showResult(d) {
  var labelEl = document.getElementById("label");
  labelEl.textContent = d.label.replace("_", " ");
  labelEl.className = "label-badge " + d.label;
  document.getElementById("confidence").textContent = "Confidence " + (d.confidence * 100).toFixed(0) + "%";
  document.getElementById("reasoning").textContent = d.reasoning;
  var topicsHtml = (d.relevance_topics || []).map(function(t) {
    return "<span class=\"topic-tag\">" + t + "</span>";
  }).join("");
  document.getElementById("topics").innerHTML = topicsHtml;
  document.getElementById("footer").textContent = "Processed " + new Date(d.processed_at).toLocaleString();
  document.getElementById("result").style.display = "block";
}

async function loadHistory() {
  try {
    var res = await fetch("/latest?limit=5");
    var items = await res.json();
    if (!items.length) return;
    document.getElementById("history-section").style.display = "block";
    var container = document.getElementById("history");
    container.innerHTML = "";
    items.forEach(function(d) {
      var div = document.createElement("div");
      div.className = "history-item";
      var badge = document.createElement("span");
      badge.className = "label-badge " + d.label;
      badge.style.cssText = "font-size:11px;padding:4px 10px;flex-shrink:0";
      badge.textContent = d.label.replace("_", " ");
      var urlSpan = document.createElement("span");
      urlSpan.className = "hi-url";
      urlSpan.textContent = d.url;
      var confSpan = document.createElement("span");
      confSpan.className = "hi-conf";
      confSpan.textContent = (d.confidence * 100).toFixed(0) + "%";
      div.appendChild(badge);
      div.appendChild(urlSpan);
      div.appendChild(confSpan);
      div.addEventListener("click", function() { showResult(d); });
      container.appendChild(div);
    });
  } catch (e) {
    // silently ignore
  }
}

loadHistory();
</script>
</body>
</html>
